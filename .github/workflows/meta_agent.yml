name: Meta Agent

on:
  schedule:
    # 5 minuten voor het volle uur, zodat bot_config.json klaar is voor de bots
    - cron: '55 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_meta_agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python 3.11 instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install requests pandas ta numpy

      - name: Meta Agent uitvoeren
        run: python meta_agent.py
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
