name: Hybrid Trading Bot

on:
  schedule:
    # Elke 4 uur op het hele uur: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: '0 */4 * * *'
  # Handmatig triggeren voor testen via GitHub Actions UI
  workflow_dispatch:

# Nodig om state.json terug te schrijven naar de repo
permissions:
  contents: write

jobs:
  run_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python 3.11 instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install anthropic ta pandas requests feedparser

      - name: Trading bot uitvoeren
        run: python bot.py
        env:
          # Automatisch beschikbaar in Actions — geen handmatig secret nodig
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          # Handmatig in te stellen via repo Settings → Secrets → Actions
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
